name: HolonNPU CI

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: holonnpu-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_DEBUG_PRESET: debug
  CMAKE_REGRESSION_PRESET: regression
  CMAKE_COVERAGE_PRESET: coverage
  CC: gcc-15
  CXX: g++-15

jobs:
  build-test-lint:
    name: Build, test, lint
    runs-on: ubuntu-26.04
    timeout-minutes: 45

    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc-15 \
            g++-15 \
            ninja-build \
            python3 \
            python3-pip \
            cmake \
            verilator
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          verilator --version
          "${CC}" --version
          "${CXX}" --version
          python3 --version

      - name: Configure debug
        run: cmake --preset "${CMAKE_DEBUG_PRESET}"

      - name: Build debug
        run: cmake --build --preset "${CMAKE_DEBUG_PRESET}" --parallel 2

      - name: Test debug fast path
        run: ctest --preset "${CMAKE_DEBUG_PRESET}" -j 2 --output-on-failure

      - name: Test RTL lint
        run: ctest --preset lint -j 2 --output-on-failure

      - name: Configure regression
        run: cmake --preset "${CMAKE_REGRESSION_PRESET}"

      - name: Build regression
        run: cmake --build --preset "${CMAKE_REGRESSION_PRESET}" --parallel 2

      - name: Regression test
        run: ctest --preset "${CMAKE_REGRESSION_PRESET}" -j 2 --output-on-failure

      - name: Configure coverage
        run: cmake --preset "${CMAKE_COVERAGE_PRESET}"

      - name: Build coverage
        run: cmake --build --preset "${CMAKE_COVERAGE_PRESET}" --parallel 2

      - name: Coverage test
        run: ctest --preset "${CMAKE_COVERAGE_PRESET}" -j 2 --output-on-failure

      - name: Upload CTest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          if-no-files-found: ignore
          path: |
            build/debug/Testing/Temporary/LastTest.log
            build/debug/CMakeFiles/CMakeConfigureLog.yaml
            build/regression/Testing/Temporary/LastTest.log
            build/regression/CMakeFiles/CMakeConfigureLog.yaml
            build/coverage/Testing/Temporary/LastTest.log
            build/coverage/CMakeFiles/CMakeConfigureLog.yaml

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          if-no-files-found: ignore
          path: build/coverage/coverage/
